name: Nuitka Release

on:
  workflow_dispatch:
    inputs:
      publish_to_release:
        description: "Также загрузить в GitHub Release"
        type: boolean
        default: false
      release_tag:
        description: "Тег релиза (например v1.2.3)"
        type: string
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            runner: ubuntu-22.04
            mode: onefile
            extra: "--linux-icon=assets/rozitta_idle.png"

          - label: macOS Intel
            runner: macos-15-intel
            mode: app
            extra: "--macos-app-icon=assets/rozitta_idle_mac2.icns --macos-app-name=RozittaParser"

          - label: macOS ARM
            runner: macos-15
            mode: app
            extra: "--macos-app-icon=assets/rozitta_idle.icns --macos-app-name=RozittaParser"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            .github/workflows/requirements-build.txt

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache build-essential patchelf

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ccache

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/Nuitka
            ~/.cache/ccache
          key: cache-${{ runner.os }}-${{ hashFiles('**/*.py', 'requirements.txt') }}

      - name: Install Python deps
        run: |
          pip install -r .github/workflows/requirements-build.txt
          pip install -r requirements.txt

      - name: Build (Nuitka)
        shell: bash
        run: |
          set -euo pipefail

          # CPU cores
          JOBS=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          echo "Using $JOBS jobs"

          # ccache
          if command -v ccache >/dev/null 2>&1; then
            export CC="ccache gcc"
            export CXX="ccache g++"
            ccache -M 500M
            ccache -s
          fi

          python -m nuitka \
            --mode=${{ matrix.mode }} \
            --jobs=$JOBS \
            --assume-yes-for-downloads \
            --enable-plugin=pyside6 \
            --include-data-dir=assets=assets \
            --lto=no \
            --output-dir=dist \
            --output-filename=RozittaParser \
            --remove-output \
            ${{ matrix.extra }} \
            main.py

          ls -laR dist/

      - name: Fix macOS app name
        if: runner.os == 'macOS'
        run: |
          APP=$(find dist -name "*.app" -print -quit)
          NEW_APP="$(dirname "$APP")/RozittaParser.app"
          mv "$APP" "$NEW_APP"

      - name: Package
        run: |
          mkdir -p upload
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            tar -I 'xz -9e' -cf upload/app-linux.tar.xz -C dist RozittaParser
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            APP=$(find dist -name "*.app" -print -quit)
            (cd "$(dirname "$APP")" && zip -r9 "$GITHUB_WORKSPACE/upload/app-macos.zip" "$(basename "$APP")")
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.label }}
          path: upload/*

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
